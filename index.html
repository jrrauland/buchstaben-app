<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Buchstaben Schreiben</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: #EEF2FF;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
#header {
  flex-shrink: 0;
  background: #4338CA;
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
#header-title { color: white; font-size: 16px; font-weight: 700; }
#header-sub   { color: rgba(255,255,255,0.6); font-size: 10px; }
#case-toggle  { display: flex; background: rgba(255,255,255,0.2); border-radius: 18px; overflow: hidden; }
.case-btn {
  padding: 4px 13px; font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,0.65); border: none; background: transparent; cursor: pointer;
}
.case-btn.active { background: white; color: #4338CA; border-radius: 18px; }

/* LETTER BAR */
#letter-bar {
  flex-shrink: 0;
  background: white;
  border-bottom: 1px solid #C7D2FE;
  padding: 6px 10px;
  display: flex; gap: 5px; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#letter-bar::-webkit-scrollbar { display: none; }
.lbtn {
  flex-shrink: 0;
  width: 34px; height: 34px; border-radius: 8px;
  border: 1.5px solid #C7D2FE; background: #EEF2FF;
  font-size: 15px; font-weight: 700; color: #4338CA;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.lbtn.active  { background: #4338CA; color: white; border-color: #4338CA; }
.lbtn.done    { background: #D1FAE5; border-color: #6EE7B7; color: #065F46; }
.lbtn.special { background: #F5F3FF; border-color: #DDD6FE; color: #6D28D9; }
.lbtn.special.active { background: #6D28D9; color: white; border-color: #6D28D9; }

/* CONTENT */
#content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 12px 12px;
  display: flex; flex-direction: column; gap: 7px;
}

/* GUIDE CARD */
#guide-card {
  flex-shrink: 0;
  background: white; border-radius: 12px;
  border: 1px solid #C7D2FE;
  padding: 8px 10px;
  display: flex; align-items: center; gap: 10px;
}
#guide-big {
  width: 58px; height: 58px; flex-shrink: 0;
  background: #EEF2FF; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
#guide-big svg { width: 48px; height: 48px; overflow: visible; }
#guide-info { flex: 1; min-width: 0; }
#guide-name { font-size: 13px; font-weight: 700; color: #1F2937; }
#guide-tip  { font-size: 11px; color: #6B7280; margin-top: 2px; line-height: 1.4; }
#anim-btn {
  flex-shrink: 0;
  background: #4338CA; color: white; border: none;
  border-radius: 8px; padding: 7px 10px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap;
}
#anim-btn:active { background: #3730A3; }

/* CANVAS AREA — square 1:1 so paths are not distorted */
#canvas-wrap {
  flex-shrink: 0;
  background: white;
  border-radius: 12px;
  border: 1px solid #C7D2FE;
  position: relative;
  overflow: hidden;
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
}
/* padding-bottom trick for 1:1 aspect ratio (works on all Android Chrome) */
#canvas-wrap::after {
  content: '';
  display: block;
  padding-bottom: 100%;
}
#draw-canvas {
  display: block;
  cursor: crosshair;
  touch-action: none;
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
}
#stroke-svg {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  opacity: 0; transition: opacity 0.25s;
}
#stroke-svg.visible { opacity: 1; }

/* TOOLBAR */
#toolbar { flex-shrink: 0; display: flex; gap: 6px; }
.tbtn {
  flex: 1; padding: 9px 4px;
  border-radius: 9px; border: 1.5px solid #E5E7EB;
  background: white; font-size: 12px; font-weight: 700; color: #374151;
  cursor: pointer;
}
.tbtn.go { background: #4338CA; color: white; border-color: #4338CA; }
.tbtn.go:active { background: #3730A3; }

/* FEEDBACK */
#feedback {
  flex-shrink: 0;
  min-height: 28px; text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
#feedback-stars { font-size: 20px; }
#feedback-msg   { font-size: 13px; font-weight: 700; color: #4338CA; }

/* PROGRESS */
#prog-wrap {
  flex-shrink: 0;
  background: white; border-radius: 12px; border: 1px solid #C7D2FE;
  padding: 8px 10px;
}
#prog-label { font-size: 10px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
#prog-row   { display: flex; gap: 3px; flex-wrap: wrap; }
.pdot {
  width: 22px; height: 22px; border-radius: 5px;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  background: #F3F4F6; color: #9CA3AF; border: 1px solid #E5E7EB;
  cursor: pointer; transition: all 0.2s;
}
.pdot.done    { background: #D1FAE5; color: #065F46; border-color: #6EE7B7; }
.pdot.current { background: #4338CA; color: white;   border-color: #4338CA; }

/* CONFETTI */
#confetti-canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100; display:none; }
</style>
</head>

<div id="header">
  <div>
    <div id="header-title">✏️ Buchstaben schreiben</div>
    <div id="header-sub">Deutsche Druckschrift</div>
  </div>
  <div id="case-toggle">
    <button class="case-btn active" id="btn-upper" onclick="setCase('upper')">ABC</button>
    <button class="case-btn"        id="btn-lower" onclick="setCase('lower')">abc</button>
  </div>
</div>

<div id="letter-bar"></div>

<div id="content">
  <div id="guide-card">
    <div id="guide-big"></div>
    <div id="guide-info">
      <div id="guide-name">Buchstabe A</div>
      <div id="guide-tip">Zwei Schrägstriche von oben – dann ein Querbalken in der Mitte.</div>
    </div>
    <button id="anim-btn" onclick="showAnim()">▶ Zeigen</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="draw-canvas"></canvas>
    <svg id="stroke-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="toolbar">
    <button class="tbtn" onclick="undo()">↩ Rückgängig</button>
    <button class="tbtn" onclick="clear()">🗑 Löschen</button>

</div>

const SK_UP = 'buch3_done_upper';
const SK_LO = 'buch3_done_lower';

function loadProg() {

    return {
      upper: new Set(JSON.parse(localStorage.getItem(SK_UP)||'[]')),
      lower: new Set(JSON.parse(localStorage.getItem(SK_LO)||'[]')),

// ── CANVAS ────────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('draw-canvas');
const ctx     = canvas.getContext('2d');
const svgOver = document.getElementById('stroke-svg');

// Size canvas to its CSS pixel size (reads wrapper since canvas is position:absolute)
function sizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.offsetWidth;
  const h = wrap.offsetHeight;
  if (w < 10 || h < 10) return; // not yet laid out
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width  = w;
    canvas.height = h;
  }
  drawGhostAndLines();
}

// Draw ruling lines + ghost letter onto the canvas
function drawGhostAndLines() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // 3 ruling lines — all solid and equally visible
  const lineYs = [h*0.2, h*0.5, h*0.8];
  lineYs.forEach((y, i) => {
    ctx.save();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(99,102,241,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(w, y);
    ctx.stroke();
    ctx.restore();
  });

  // Ghost letter — drawn from STROKES paths so it matches the guide SVG exactly
  const letter = letters[idx];
  const defs = STROKES[letter] || [];
  if (defs.length > 0) {
    ctx.save();
    // Uniform scale: canvas is square, viewBox is 100×100 — no distortion
    const pad = 0.08;
    const size = Math.min(w, h); // always equal since canvas is square
    const scale = size * (1 - pad * 2) / 100;
    const offsetX = (w - size * (1 - pad * 2)) / 2;
    const offsetY = (h - size * (1 - pad * 2)) / 2;
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    defs.forEach(stroke => {
      const sp2 = stroke[0].trim().split(' '); const isDot = sp2.length === 2 && sp2[1].replace('L','M') === sp2[0];
      ctx.strokeStyle = 'rgba(99,102,241,0.13)';
      ctx.lineWidth = (isDot ? 13 : 7) / scale;
      const p = new Path2D(stroke[0]);
      ctx.stroke(p);
    });
    ctx.restore();
  }

  // Redraw user strokes on top
  drawStrokes();
}

function drawStrokes() {
  ctx.save();
  ctx.strokeStyle = '#4338CA';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  strokes.forEach(st => {
    if (st.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(st[0].x, st[0].y);
    for (let i = 1; i < st.length; i++) ctx.lineTo(st[i].x, st[i].y);
    ctx.stroke();
  });
  ctx.restore();
}

function getPos(e) {
  const r   = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

canvas.addEventListener('mousedown', e => {
  drawing = true;
  const p = getPos(e); curStroke = [p];
  ctx.save(); ctx.strokeStyle='#4338CA'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const p = getPos(e); curStroke.push(p);
  ctx.lineTo(p.x, p.y); ctx.stroke();
});
canvas.addEventListener('mouseup', () => {
  if (!drawing) return; drawing = false; strokes.push([...curStroke]); curStroke = []; ctx.restore();
});
canvas.addEventListener('mouseleave', () => {
  if (!drawing) return; drawing = false; strokes.push([...curStroke]); curStroke = []; ctx.restore();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); drawing = true;
  const p = getPos(e); curStroke = [p];
  ctx.save(); ctx.strokeStyle='#4338CA'; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault(); if (!drawing) return;
  const p = getPos(e); curStroke.push(p); ctx.lineTo(p.x, p.y); ctx.stroke();
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault(); if (!drawing) return;
  drawing = false; strokes.push([...curStroke]); curStroke = []; ctx.restore();
}, {passive:false});

function clear() {
  strokes = [];
  drawGhostAndLines();
  hideAnim();
  setFeedback('','');
}
function undo() {
  strokes.pop();
  drawGhostAndLines();
}

// ── STROKE ANIMATION ──────────────────────────────────────────────────────────
const COLORS = ['#EF4444','#F59E0B','#10B981','#6366F1','#EC4899'];

function showAnim() {
  if (animRunning) return;
  animRunning = true;
  hideAnim();
  const letter = letters[idx];
  const defs   = STROKES[letter] || [['M20,10 L80,90']];
  svgOver.setAttribute('viewBox','0 0 100 100');
  svgOver.setAttribute('preserveAspectRatio','xMidYMid meet');
  svgOver.innerHTML = '';
  svgOver.classList.add('visible');

  function step(si) {
    if (si >= defs.length) { animRunning = false; return; }
    const d     = defs[si][0];
    const color = COLORS[si % COLORS.length];

    // Start circle + number
    const m = d.match(/M([\d.]+),([\d.]+)/);
    if (m) {
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', m[1]); c.setAttribute('cy', m[2]);
      c.setAttribute('r','5'); c.setAttribute('fill', color);
      svgOver.appendChild(c);
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', m[1]); t.setAttribute('y', parseFloat(m[2])+3);
      t.setAttribute('text-anchor','middle'); t.setAttribute('fill','white');
      t.setAttribute('font-size','5'); t.setAttribute('font-weight','bold');
      t.textContent = si+1; svgOver.appendChild(t);
    }

    // Animated path
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d); path.setAttribute('fill','none');
    const parts = d.trim().split(' '); const isDot = parts.length === 2 && parts[0] === parts[1].replace('L','M');
    path.setAttribute('stroke', color); path.setAttribute('stroke-width', isDot ? '6' : '3');
    path.setAttribute('stroke-linecap','round'); path.setAttribute('stroke-linejoin','round');
    const L = 300;
    path.style.strokeDasharray = L; path.style.strokeDashoffset = L;
    path.style.transition = 'stroke-dashoffset 0.6s ease-in-out';
    svgOver.appendChild(path);
    requestAnimationFrame(() => requestAnimationFrame(() => { path.style.strokeDashoffset = 0; }));
    setTimeout(() => step(si+1), 800);
  }
  step(0);
}

// Render the guide-big box as SVG from STROKES paths
function renderGuideSVG(letter) {
  const defs = STROKES[letter] || [];
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.setAttribute('xmlns', ns);
  defs.forEach(stroke => {
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', stroke[0]);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#4338CA');
    const sp = stroke[0].trim().split(' '); const isDot = sp.length === 2 && sp[1].replace('L','M') === sp[0];
    path.setAttribute('stroke-width', isDot ? '14' : '8');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);
  });
  const el = document.getElementById('guide-big');
  el.innerHTML = '';
  el.appendChild(svg);
}


function hideAnim() {
  svgOver.classList.remove('visible');
  svgOver.innerHTML = '';
  animRunning = false;
}

// ── CHECK ─────────────────────────────────────────────────────────────────────
function checkDone() {
  const pts = strokes.reduce((s, st) => s + st.length, 0);
  if (pts < 8) {
    setFeedback('', 'Noch einmal versuchen! 💪');
    document.getElementById('feedback-msg').style.color = '#EF4444';
    return;
  }
  let stars, msg;
  if (pts >= 80)      { stars='⭐⭐⭐'; msg='Super gemacht!'; }
  else if (pts >= 30) { stars='⭐⭐';  msg='Gut gemacht!'; }
  else                { stars='⭐';    msg='Weiter üben!'; }
  setFeedback(stars, msg);
  document.getElementById('feedback-msg').style.color = '#4338CA';
  if (pts >= 30) {
    doneSet.add(letters[idx]);
    saveProg();
    refreshLetterBar();
    buildProg();
    if (pts >= 80) confetti();
    setTimeout(nextLetter, 1300);
  }
}

function setFeedback(stars, msg) {
  document.getElementById('feedback-stars').textContent = stars;
  document.getElementById('feedback-msg').textContent   = msg;
}

function nextLetter() {
  selectIdx((idx + 1) % letters.length);
}

// ── LETTER SELECT ─────────────────────────────────────────────────────────────
function selectIdx(newIdx) {
  idx = newIdx;
  // Update guide card
  const letter = letters[idx];
  renderGuideSVG(letter);
  document.getElementById('guide-name').textContent = 'Buchstabe ' + letter;
  document.getElementById('guide-tip').textContent  = TIPS[letter] || 'Schreibe den Buchstaben nach.';
  // Clear canvas (redraws ghost with new letter)
  strokes = [];
  hideAnim();
  setFeedback('','');
  drawGhostAndLines();
  // Update button highlights
  refreshLetterBar();
  buildProg();
}

function setCase(c) {
  mode    = c;
  letters = c === 'upper' ? UPPER : LOWER;
  document.getElementById('btn-upper').classList.toggle('active', c==='upper');
  document.getElementById('btn-lower').classList.toggle('active', c==='lower');
  const prog = loadProg();
  doneSet = c==='upper' ? prog.upper : prog.lower;
  buildLetterBar();
  selectIdx(0);
}

function buildLetterBar() {
  const bar = document.getElementById('letter-bar');
  bar.innerHTML = '';
  letters.forEach((l, i) => {
    const btn = document.createElement('button');
    const special = ['Ä','Ö','Ü','ß','ä','ö','ü'].includes(l);
    btn.className = 'lbtn' + (special ? ' special' : '');
    btn.textContent = l;
    btn.onclick = () => selectIdx(i);
    bar.appendChild(btn);
  });
  refreshLetterBar();
}

function refreshLetterBar() {
  document.querySelectorAll('.lbtn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
    btn.classList.toggle('done',   doneSet.has(letters[i]) && i !== idx);
  });
}

function buildProg() {
  const row = document.getElementById('prog-row');
  row.innerHTML = '';
  letters.forEach((l, i) => {
    const dot = document.createElement('div');
    dot.className = 'pdot' + (doneSet.has(l) ? ' done' : '') + (i===idx ? ' current' : '');
    dot.textContent = l;
    dot.onclick = () => selectIdx(i);
    row.appendChild(dot);
  });
  document.getElementById('prog-label').textContent =
    `Fortschritt: ${doneSet.size} / ${letters.length}`;
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function confetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.style.display = 'block';
  cc.width  = window.innerWidth;
  cc.height = window.innerHeight;
  const cx = cc.getContext('2d');
  const ps = Array.from({length:65}, () => ({
    x: Math.random()*cc.width, y: -12,
    w: 7+Math.random()*8, h: 4+Math.random()*4,
    c: ['#4338CA','#EC4899','#F59E0B','#10B981','#EF4444'][Math.floor(Math.random()*5)],
    vx:(Math.random()-.5)*4, vy:2+Math.random()*3,
    a:Math.random()*360, va:(Math.random()-.5)*6,
  }));
  let f = 0;
  (function tick() {
    cx.clearRect(0,0,cc.width,cc.height);
    ps.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.a+=p.va;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.a*Math.PI/180);
      cx.fillStyle=p.c; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore();
    });
    if(++f<85) requestAnimationFrame(tick);
    else { cx.clearRect(0,0,cc.width,cc.height); cc.style.display='none'; }
  })();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  const prog = loadProg();
  doneSet = prog.upper;
  buildLetterBar();
  buildProg();
  // Wait for layout, then size canvas and draw
  requestAnimationFrame(() => {
    sizeCanvas();
    selectIdx(0);
  });
  window.addEventListener('resize', () => { sizeCanvas(); });
})();
</script>
